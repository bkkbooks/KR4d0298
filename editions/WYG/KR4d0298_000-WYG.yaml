body:
  text: 提要芳蘭軒集别集類三宋臣等謹案芳蘭軒集一巻宋徐照撰照字道暉一字靈暉永嘉人與徐璣翁巻趙師秀並有詩名時稱永嘉四靈照自號曰山民故其集又曰山民集趙師秀清苑齋集有哀山民詩可以為證而陳振孫書録解題獨稱照自號天民未知何據當屬傳刻之訛也四靈以晚唐之體一變西江餘派皆嘗遊葉適之門故適作照墓誌稱其有詩數百琢思尤奇皆横絶歘起冰懸雪跨使讀者變踔憀慓肯首吟嘆不能自已然無異語皆人所知也人不能道耳所以推奬之者甚至而呉子良荆溪林下偶談則謂適雖不沒其所長而亦終不滿之故其跋劉潛夫詩巻又有進乎古人而不已何必四靈之語後人不知以為水心崇尚晩唐者誤也蓋四靈之詩雖鏤心鈢腎刻意雕琢而取逕太狹終不免破碎尖酸之病照在諸家中尤為清瘦如其寄翁靈舒詩中樓髙望見船句方回以為眼前事道著便新又冬日書事詩中梅遲思閏月楓逺誤春花句回亦以為思字誤字當是推敲不一乃得之是皆集中所稱佳句要其清雋者在此其卑靡者亦即在此風㑹升降之際固有不能自掩者矣照集原本三巻此本祇一巻不知何人所併又從瀛奎律髓得詩六首東甌詩集得詩二首東甌續集得詩一首併列為補遺附之於後焉二薇亭詩集别集類三宋臣等謹案二薇亭詩集一巻宋徐璣撰璣字文淵一字致中號靈淵趙師秀集作靈囦古今字也永嘉人為四靈之一宋元詩㑹載璣官建安主簿龍溪丞武當長泰令嘉定七年卒年五十九而陳振孫書録解題曰四人者惟師秀嘗登科改官意謂三人皆未嘗出仕曹學佺亦謂二徐皆隠居不仕今觀此巻中璣有監造御茶五言古詩蓋為主簿時作其贈趙師秀詩有遊宦歸來幾度春之句七言絶句又有移官南浦一首則陳振孫所言偶然失考學佺又誤因之也振孫所載璣集一巻與此本相符其名二薇亭集則通考未載或亦偶遺之也集後有補遺三首從瀛奎律髓東甌詩集束甌續集中抄出厲鶚宋詩紀事載璣又有泉山集今未之見或東甌詩集所載為泉山集中詩歟乾隆四十六年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
