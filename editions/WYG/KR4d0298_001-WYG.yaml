body:
  text: 芳蘭軒集宋徐照撰自君之出矣三首自君之出矣心魂逺相隨折破唐人絹經經是雙絲自君之出矣玉琴生塵垢蓮子種成荷曷時可成藕自君之出矣懶妝眉黛濃愁心如屋漏㸃㸃不移蹤春日曲中婦掃蠶蟻挈籃桑葉間小姑摘新茶日斜下前山莫愁曲莫愁石城住今來無莫愁只重石城水曽汎莫愁舟三峽吟山水七百里上有青楓林啼猿不自愁愁落行人心蝗飛髙戰士屍上蟲蟲老生翅翼目怒體甲硬豈非怨氣激櫛櫛北方來横遮遍天黒戍婦聞我言色變氣咽逆良人進戰死屍骸委砂礫昨夜魂夢歸白騎暁無迹因知天中蝗乃是屍上物仰面久迎視低頭淚雙滴呼兒勿殺害解繫從所適蝗乎若有知飛入妾心臆猛虎行猛虎出林行咆哮取人食居人慮虎至荆棘挂墻壁虎乃愛其身驚遁不近側人兮弗如虎甘心墮荆棘妾薄命初與君相知便欲肺腸傾只擬君肺腸與妾相似生徘徊幾言笑始悟非真情妾情不可收悔思淚盈盈古怨曲易得君知音難得君知心縱然恩義短寜使言語深渴飲貪泉水倦息惡木隂儻渉不美名曷可銷煩襟李夫人延年有妹顔如花十四選入君王家翡翠結簾玉鏤床君王一時無蹔忘朝朝出入芙蓉殿莫道妾身出㣲賤妾生未久身入泉上天何不與妾年君王愛妾言不死逐夜宫中喚方士廢居行北風蕭蕭戰馬鳴邊人走盡空户庭黄金埋藏禾米棄路上逐日長飢行子西父南弗相守仰面看日啼無聲生身不合屬中土自昔無時無戰争柔桑椹熟生野蛾良田蕪沒平成坡一路幾州盡荒廢處處戰骨平草多傳報將軍殄强侮取得山河歸漢主殘生只願還本鄉難保後裔無兵禍促促詞促促復促促東家歡欲歌西家悲欲哭丈夫力耕長忍飢老婦勤織長無衣東家鋪君不出户父為節級兒抄簿一年兩度請官衣每月請米一石五小兒作軍送文字三旬一輪怨辛苦征婦思年半為郎婦郎去戍采石又云戍濠梁不得真消息半年無信歸獨自守羅幃西風吹妾寒倩誰寄郎衣姑老子在腹憶郎損心目願郎征戰早有功生子有䕃姑有封青鳩詞勞勞復勞勞生人半行客今人行古道古道有行役相逢莫等閒相離易疎隔殷勤紅杏花徹宵對芳席明年花開人東西青鳩食花舊處啼灉湖作灉湖春來水拍天秋來水涸成乾田盈虚不可保富貴於人豈長好何所歸笭箵下後灣彴畧下前浦遊鱗棲身更何所柳葉詞嫩葉吹一作因風不自持淺黄微緑映清池玉人未識分離恨一作苦折向堂前學畫眉越魚吟越魚生水中専食水上禽禽又安知魚魚自生機心越魚早來人釣得人却放之反不食分題得漁村晩照漁師得魚繞溪賣小船横繫柴門外出門老嫗喚鷄犬收歛蓑衣屋頭曬賣魚得酒又得錢歸來醉倒地上眠小兒啾啾問煮米白鷗飛去蘆花烟送翁誠之又作巴陵縣南州舊有聲未憑湘水緑能似長官清笛冷君山月帆輕夏浦晴五言多好句顔杜减詩名宿翁靈舒幽居期趙紫芝不至江城過一宿秋氣入宵濃蛩響移砧石螢光出瓦松月遲將近曉角盡即聞鐘人起行庭際思君恨幾重贈江心寺欽上人客至啟幽户笋鞋行曲廊潮侵坐禪石雨潤讀經香古硯傳人逺新篁過塔長城中如火熱此地獨清凉白下白下嚴州近﨑嶇昔未經年豐山米賤溪涸石苔腥一月無新句千岑役瘦形人家今畏虎未晩户先扄贈劉明逺一生嫌世俗不向市中居既是未攀桂却堪同釣魚疾除禪老藥詩答野人書又説成丹鼎吾生愧不如送塵老入廣化米開田行李衝氷雪途程半是船去從人乞米歸要海成田遇景因開畫思茶自掬泉好風名舶䑲相候立江邊送朱嚴伯好别無愁思風霜一歲殘去因貧事迫歸有暮年安逺水維舟晩青山遶舍寒有誰憐静者得句不同看途中隻影㣲陽外青山自鬰盤未經千里逺欲寄一書難堠碣苔侵字魚塘水過欄西風吹樹葉不問客衣单還舊山作雲駮天初霽㩦兒下短篷數莖歸􅁂白一袖俗塵空日子差潮候秋容在蓼叢江神應念我平穏不生風宿寺古殿清燈冷虛廊葉掃風揜闗人迹外得句佛香中鶴睡應無夢僧談必悟空坐驚窗欲曉片月在林東題江心寺兩寺今為一僧多外國人流來天際水截㫁世間塵鴉宿腥林徑龍歸損塔輪却疑成片石曾坐謝公身題羅隠故居片水静無塵青山是四隣上天如有意此地著詩人吟得物俱盡罰令生世貧因來㝷古跡只見石為麟題桃花夫人廟一樹桃花發桃花即是君空池臨野水何處覓行雲事迹樵人説爐香過客焚雨添碑上蘚難讀古詩文送李偉歸黄山心和無白髪長帶一琴行幾路到君屋數峰當郡城妻兒貧自樂丹藥嵗燒成未必聖明代終令隠姓名懐如順上人西湖湖上寺一别二三年舊住房長閉新栽樹已圓空多相憶夢不得寄來篇喜見隣僧説歸期是臘前訪觀公不遇卧犬聞人出門當青櫟林固知多不在自逺欲相尋宵短餘香印鄰踈出磬音昨來曾寄茗應念苦吟心哭居塵禪師今朝聞實信一隻海船遥此世永相隔何僧可與交茶從秋後盡門絶月中敲昨夜山家夢親曾到石橋衰柳風吹無一葉不復翠成窠枝脆經霜氣根空入水波寒棲江鷺早暗出野螢多廢苑荒堤外人嗟舊跡過鷺鷥一㸃白如雪頂黏絲數莖沙邊行有跡空外過無聲髙柳巢方穏危灘立不驚每看閒意思漁父是前生登歙山寺石徑半欹傾山頭路始平歩因花樹息吟忘寺僧迎一面門無水東隅路入京青峰三十六霜曉見分明漁家阿翁年紀老生計在綸絲野水無人占扁舟逐處移數鱗新柳串一笛小兒吹有酒全家醉公卿要識誰山中即事著屐上崔嵬呼兒注瓦杯千岑經雨後一鴈帶秋來野艇乗湖發山園逐主開餘生落樵牧門巷少塵埃題道上人房老梅香有竹風知無塵雜野姿為憐新白髪重記舊題詩蘚帶龍鱗剥蜂沾蠧屑垂不來三十載半樹是孫枝送翁誠之赴闕我亦清湘去何年可㑹君貧惟詩送别愁覺酒難醺郊祀隨天仗臺占識瑞雲定知分美郡音問欲相聞石門瀑布一𣲖従天下曾經李白看千年流不盡六月地長寒灑木跳㣲沫衝崖作怒湍人言深碧處常有老龍盤宿永康路有三千里春容若未濃淺塘饑鷺下晴靄市烟衝孤望生遥思頻過記昔蹤宿程知近縣聞打法燈鐘題衢州石壁寺岸石横生脉平林一里溪衆船寒渡集髙寺逺山齊殘磬吹風㫁眠禽壓竹低自嫌昏黒至難認壁間題題信州祥符寺氷溪清絶地誰擬此身來寺古逢僧老山髙見水回巖花寒未拆風靄薄難開塔下看碑石因尋跨鶴臺題信州趙昌甫林居譜接江西𣲖聲名過浙間棄官從早嵗買屋向深山文集通僧借漁舟載鶴還待予歸舊里又得到柴闗路逢楊嘉猷赴官嚴州詩合誠齋意難將片石鐫相逢因在道惜别未移船野步僧同坐宵吟吏廢眠思君還有夢前到釣臺邊過鄱陽湖港中分十字蜀廣亦通連四望疑無地孤舟若在天龍尊收巨浪鷗小沒蒼烟未渡皆驚畏吾今已帖然題薌林秪為登山逺當門疊石為人來嗟故跡景勝入名詩立鶴髙過檻欹花半在池百年庭際木新長挂冠枝宿吉州永慶寺古邑溪邊寺吟人愛寂寥少僧齋室廢乞食釣鄉遥鐘韵含霜氣樓簷近斗杓漢時銅鑄佛瞻禮到今朝題浯溪知是漫郎宅舟中聞寺鐘小溪通正港髙石壓羣峰緑木成春䕃荒臺見古蹤唐碑三十本獨免野苔封永州書懐嗜茶疑是病羸瘦見詩形天斷征鴻過河多香草青興髙貧不覺身逺事皆經歸路當遊嶽僧言極可聴夜聴黄仲立彈廣陵月色照君琴移床出木隂數聲廣陵水一片古人心投劍功無補衝冠怒亦深縱能清客耳還是亂時音鴈今春北歸鴈秋至又南征冷避燕闗雪暖逢湘水晴連行衝燒斷並食雜鷗行沙上無矰弋相呼一夜鳴湖中别鄧該隔水鷓鴣鳴一汀香草生自憐為客久誰忍送君行後㑹期何日歸途喜乍晴它春科甲上必欲見題名筠州送趙院判歸九江相逢今半月夜雨厭同聞逺地長為客還家極羡君詩低勞盡寫茶美許重分一馬衝寒去廬峰正雪雲移家鴈池不向山中住城中住此身家貧兒廢學寺近佛為隣雪長官河水鴻驚釣渚春夜來遊嶽夢重見日東人送翁靈舒遊邊孤劍色磨青深謀祕鬼靈離山春值雪憂國夜觀星奏凱邊人悦翻營戰地腥期君一作他時歸幕下何石可書銘懷趙紫芝一别一百日無書直至今幾回成夜夢獨自廢秋吟小雪衣猶綌荒年米似金知音人亦有誰若爾知心贈九華李丹士長記零陵郡共看江上峯一生輕世事幾處認仙蹤轉式驅雷電封泥伏虎龍三千三百里今日又相逢送奭上人化緣専志事皆成期師此一行閣盛靈物像碑載施人名江濶風催渡村深雪廢程暫勞曾共説終可送閒情白石巖一石入遥天千峰疊在前人行不到處仙去未多年竇暗雲生像簷斜日照泉皇朝宣賜物弟子尚能傳題薛景石𤓰廬何地有𤓰廬平湖四畝餘自鋤畦上草不放手中書人逺來求字童閒去釣魚山民山上住却羡水邊居夀昌道中碣字芙蓉驛喜行行不難路侵滄海過人得異山看圓石蠔黏滿平途鷺立寒一遊期一月回日必冬殘龍湫瀑布飛下數千尺全然無定形電横天日射龍出石雲腥壯勢春曾看寒聲佛共聴昔人云此水洗目最能靈靈峰我來無一語閒認昔遊蹤誰種路旁樹却遮山上峯潭乾沈石露人立去禽衝樵説仙橋險因思在上封石門菴庵是何年作其中住一僧蒼崖從古險白日少人登衆物清相映吾生隠未能夜來新過虎抓折樹根藤題夏景清湘中閣湘中山與水自古有人云此是曽遊地今來盡屬君殘風吹岸草空廟入江雲却憶還鄉夢清猿半夜聞題翁巻山居二首十年前有約今却在城居羡爾能㩦子深山自結廬引泉移岸石栽藥就園蔬見説髙林外樵人聴讀書空山無一人君此寄閒身水上花一作禽來逺風中葉一作風前樹動頻蟲行黏壁字茶煮落巢薪若有髙人至何妨不裹巾病中作一行三步歇屋漏坐頻移妻欲藏茶鼎僧能施藥資鄰園梅盡發河岸草生遲天解憐貧病難令不作詩未迴車山川匪遥逺行人未迴車欲語昨宵夢忽接今朝書啼鳥在屋上綠草生庭除仰看日月光照知子衿裾謝徐璣恵茶建山惟上貢采擷極艱辛不擬分竒品遥將寄野人角開秋月滿香入井泉新静室無來客碑黏陸羽真中夕中夕獨依依閒行未掩扉水邊山出月松上雨沾衣棹響初如近螢光漸欲稀不甘塵内事長與此心違題丁少瞻林園州分低嶺外來向此園行路改初栽樹堂成未有名藥苗如草長巖溜入池清欲識懷君意時聞鶴一鳴訪僧居客至無他事房門不厭敲好山原帶郭損屋旋鋪茅静砌生靈藥髙林出逺郊水禽多不見春暖漸營巢永州寄翁靈舒古郡百蠻邊蒼梧九㸃烟去家疑萬里歸計在明年風順眠聴角樓髙望一作坐見船筠州當半道長得秀一作寄詩篇能仁寺寺置有碑傳觀音巖石前殿髙燈焰短山合磬聲圓窗静吹寒雪春鳴落夜泉清遊人豈識謂不似秋天題李商叟半村壁一徑蒼苔合連年不出門風髙松有韵溪滿石無痕不自知名重令人覺道尊更憂徴詔至移室向深村挽王大夫兩任身為郡里中如不知民歸清净化家似困窮時秦木凄秋韵湘雲結暮姿若無遺愛在何得後人思詶翁常之半掩柴門一徑深山中免見一作久謝俗塵侵愁因有酒春生面老不饒貧雪滿簮舊井逺一作泉通幽谷水翠闕三字小窗隂一云翠藤新長草堂隂扁舟莫負林間約好把清詩一作好寄新題慰此心贈從善上人骨氣清泠無片塵即應僧可是前身詩因圓解堪呈佛棋與禪通可悟人掃地就凉松日少煮茶消困石泉新不能來住城中寺去買青山約我隣山中寄翁巻忽看春至復春還門外烟雲沒野山吟有好懷忘瘦苦貧多難事壊清閒柳花未散色全緑杜宇乍啼聲更蠻聞到掃松溪雨後夢隨溪雨到巖闗送塵老歸舊房數間茅屋殘山外片石崚增樹影交給假兩旬秋易盡相尋一舍路非遥盆栽怪木縁能畫池養嘉魚不入庖聞道水松三百步夢隨流水到溪橋猿皮路逢巴客賣猿皮一片䝉茸似黒絲常向小窗鋪坐處却思空谷聴啼時弩傷忽見痕猶在笛響誰誇骨可吹古樹團團行路曲無人來作野賔詩㑹飲鮑使君池亭案上一琴書數巻不須此處有笙歌厭居城市觀天小喜到君家見月多葉滿地飛隨步履鶴於人熟聴吟哦明朝也向山中去手把松枝養太和宿翁巻書齋一山秋色同誰看又復相尋出郭來隣竹種成髙礙月井泉汲少近生苔忽驚寒事砧初動不辨晨光户盡開君愛苦吟吾喜聴世人誰更重清才題永州唐徳明竹園渭川千畝空聞説得似君家亦是難畦僕不知生鳯實野翁祗欲乞漁竿忽驚殘粉飄蒼雪最喜幽聲勝逺灘六月火雲飛不盡誰知此處獨清寒同劉孝若野步杖履相従步野田坐臨堦戺和詩篇要看隔水人家菊試借繋門漁父船且緩歸舟知有月不生酒興為無錢寒來莫問家中事纔得身閒即是仙詶贈徐璣每到齋門敲始應池禽雙戱動清波愛閒却道無官好住僻如嫌有客多字學晉碑終日寫詩成唐體要人磨山民百事今全懶祗合烟江著短蓑髙山寺晩望石路近門方不險刺桐踈處見僧歸小坡重疊無平屋四月隂寒尚裌衣山到道州髙莫比水分湘口緑相圍暮雲不隔東南望一片遥兼白鳥飛觀所養鸂鶒一身文采異常流却使閒身不自由永日翠籬相並睡豈無魂夢到滄州題趙運管吟篷飛塵難到碧波中波上烟雲盡不同吟斷不知驚鷺起汀花一半在船篷舟上小船停槳逐潮還四五人家住一灣貪看曉光侵月色不知雲氣失前山聞水燈光難照客懷開忽聴寒聲響似雷天氣無風樹無葉道州半夜水流來杜甫墳耒陽知縣非知己救厄無蹤豈忍聞若更聲名可埋沒行人定不弔空墳題趙明叔新居社壇側近地圖寛所作園池在此間十萬人家城裡住少聞人有對門山題張提舉西野渡頭風景如前日誰種桃花在兩邊未晩人家門户閉鷺鷥閒立釣魚船懷趙紫芝翁靈舒紫芝别我天台去翁十深山自結茅但見春愁隨日長不知庭葉蔽禽巢采蘭曲門前春水清如羅采蘭船小長經過未須折蘭喜相贈見此自令憂思多李溪曲别鄭遇七十二灘聲共聞一朝路向李溪分梅花無情動春夢未好憶家先憶君寄家書作屋頭桑葉大如錢知是吳蠶第一眠逺水忽來瀟岸沒家書却寄道州船拾遺題釣臺當時廊廟去此地也成空草木多年換兒孫近代窮無言傷末俗久立慕髙風梅福神仙者新知是婦翁和翁靈舒冬日書事三首石縫敲氷水凌寒自煮茶梅遲思閏月楓逺誤春花貧喜苗新長吟憐鬢已華城中尋小屋嵗晩欲移家秀句出寒餓從人笑我清步溪波逐影吟竹鳥譍聲酒裡安天命一作運春邊見物情畊桑都不事何處可營生十日南山雪今朝又北風燒衝巖石斷梅映野堂空難語傷時事無成愧老翁一生吟思味獨喜與君同寄筠州趙紫芝推官府後巖巒衆何時訪古仙井甘鄰室共鐘逺雪風傳病去茶難廢詩多石可鐫蜀江春未動猶得緩歸船贈不食姑衣以青為色謂如天骨青近年全不食飲水自通靈心信生狂語清羸改俗形半空仙樂奏曾向静中聴右詩六篇從瀛奎律髓補錄贈徐璣一舸寒江上梅花共别離不來相送處愁有獨歸時去夢千峰逺為官三嵗期思君何可見新集見君詩贈溪上翁生事付諸兒日髙睡起遲本無塵内事亦有鬢邊絲逺取泉烹茗新移棘補籬晚來持釣去一犬自相隨右詩二篇從東甌詩集補録山中世事已無營翛然物外形野蔬僧飯潔山葛道衣輕掃葉燒茶鼎標題記藥瓶敲門有賔客稚子㑹相迎右詩一篇從東甌續集補録芳蘭軒集
